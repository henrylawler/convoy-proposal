<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convoy Capital Intelligence — Live Demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --blue: rgb(0,48,91);
    --blue-light: rgba(0,48,91,0.08);
    --blue-mid: rgba(0,48,91,0.72);
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
    --bg: #fafaf9;
    --card: #ffffff;
    --border: #e8e4de;
    --text: #1a1816;
    --muted: #6b6560;
  }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  
  /* Header */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 24px; color: var(--blue);
  }
  .header .tag {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  .header .stats {
    display: flex; gap: 24px; font-size: 13px; color: var(--muted);
  }
  .header .stats strong { color: var(--blue); font-weight: 600; }

  /* Layout */
  .app { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 65px); }
  
  /* Map */
  #map { width: 100%; height: 100%; }
  
  /* Sidebar */
  .sidebar {
    background: var(--card); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  
  /* Filters */
  .filters {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filters select, .filters input {
    font-family: 'Inter', sans-serif; font-size: 12px;
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--bg); color: var(--text);
  }
  .filters select:focus, .filters input:focus { outline: none; border-color: var(--blue); }
  
  /* Property list */
  .prop-list { flex: 1; overflow-y: auto; }
  .prop-card {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .prop-card:hover { background: var(--blue-light); }
  .prop-card.active { background: var(--blue-light); border-left: 3px solid var(--blue); }
  .prop-card .address { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .prop-card .meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .prop-card .score-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 12px; font-weight: 700; color: white; float: right;
  }
  .score-high { background: var(--green); }
  .score-mid { background: var(--amber); }
  .score-low { background: var(--red); }

  /* Detail panel */
  .detail-panel {
    display: none; position: absolute; bottom: 0; left: 0; right: 380px;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 24px 32px; max-height: 280px; overflow-y: auto;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
  }
  .detail-panel.open { display: block; }
  .detail-panel .close-btn {
    position: absolute; top: 12px; right: 16px; background: none;
    border: none; font-size: 18px; cursor: pointer; color: var(--muted);
  }
  .detail-panel h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  }
  .detail-item { font-size: 12px; }
  .detail-item .label { color: var(--muted); margin-bottom: 2px; }
  .detail-item .value { font-weight: 500; }

  /* Score breakdown */
  .breakdown { margin-top: 16px; }
  .breakdown h4 { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--blue); }
  .breakdown-bar {
    display: flex; align-items: center; margin-bottom: 4px; font-size: 11px;
  }
  .breakdown-bar .bar-label { width: 100px; color: var(--muted); }
  .breakdown-bar .bar-track {
    flex: 1; height: 6px; background: var(--bg); border-radius: 3px; margin: 0 8px;
  }
  .breakdown-bar .bar-fill {
    height: 100%; border-radius: 3px; background: var(--blue);
  }
  .breakdown-bar .bar-val { width: 30px; text-align: right; font-weight: 500; }

  /* Leaflet popup override */
  .leaflet-popup-content { font-family: 'Inter', sans-serif; font-size: 12px; line-height: 1.5; }
  .leaflet-popup-content strong { font-weight: 600; }

  /* Mobile */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
    .detail-panel { right: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="tag">Acquisitions Intelligence</div>
    <h1>Convoy Capital Partners</h1>
  </div>
  <div class="stats">
    <span><strong id="propCount">0</strong> properties</span>
    <span><strong id="avgScore">0</strong> avg score</span>
    <span id="scanTime"></span>
  </div>
</div>

<div class="app">
  <div style="position:relative;">
    <div id="map"></div>
    <div class="detail-panel" id="detailPanel">
      <button class="close-btn" onclick="closeDetail()">&times;</button>
      <div id="detailContent"></div>
    </div>
  </div>
  
  <div class="sidebar">
    <div class="filters">
      <select id="filterScore" onchange="applyFilters()">
        <option value="0">All scores</option>
        <option value="80">80+</option>
        <option value="70">70+</option>
        <option value="60">60+</option>
      </select>
      <select id="filterTax" onchange="applyFilters()">
        <option value="">All tax status</option>
        <option value="Delinquent">Delinquent</option>
        <option value="Current">Current</option>
      </select>
      <select id="sortBy" onchange="applyFilters()">
        <option value="score">Sort: Score</option>
        <option value="value">Sort: Value</option>
        <option value="size">Sort: Size</option>
      </select>
    </div>
    <div class="prop-list" id="propList"></div>
  </div>
</div>

<script>
// Load embedded data
const rawData = JSON.parse(document.getElementById('propertyData').textContent);
let allProperties = rawData.properties;
let markers = {};
let map, selectedId = null;

function fmt(n) { return n ? n.toLocaleString() : '—'; }
function fmtMoney(n) { return n ? '$' + n.toLocaleString() : '—'; }

function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 65) return 'score-mid';
  return 'score-low';
}

function scoreColor(s) {
  if (s >= 80) return '#16a34a';
  if (s >= 65) return '#d97706';
  return '#dc2626';
}

function initMap() {
  map = L.map('map').setView([33.78, -84.35], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);
}

function addMarkers(props) {
  // Clear existing
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  props.forEach(p => {
    const color = scoreColor(p.score);
    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 7, fillColor: color, color: '#fff', weight: 1.5,
      opacity: 1, fillOpacity: 0.85
    }).addTo(map);

    marker.bindPopup(`
      <strong>${p.address}</strong><br>
      Score: ${p.score} · ${fmt(p.buildingSF)} SF<br>
      ${fmtMoney(p.assessedValue)} · ${p.taxStatus}
    `);

    marker.on('click', () => selectProperty(p.id));
    markers[p.id] = marker;
  });
}

function renderList(props) {
  const list = document.getElementById('propList');
  list.innerHTML = props.map(p => `
    <div class="prop-card ${selectedId === p.id ? 'active' : ''}" 
         onclick="selectProperty(${p.id})" data-id="${p.id}">
      <div class="score-badge ${scoreClass(p.score)}">${p.score}</div>
      <div class="address">${p.address}</div>
      <div class="meta">
        <span>${fmt(p.buildingSF)} SF</span>
        <span>${fmtMoney(p.assessedValue)}</span>
        <span>${p.taxStatus}</span>
        <span>${p.zoning}</span>
      </div>
    </div>
  `).join('');

  // Update header stats
  document.getElementById('propCount').textContent = props.length;
  const avg = props.length ? Math.round(props.reduce((s,p) => s + p.score, 0) / props.length) : 0;
  document.getElementById('avgScore').textContent = avg;
}

function selectProperty(id) {
  selectedId = id;
  const p = allProperties.find(x => x.id === id);
  if (!p) return;

  // Highlight in list
  document.querySelectorAll('.prop-card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.id) === id);
  });

  // Pan map
  map.setView([p.lat, p.lon], 13);
  if (markers[id]) markers[id].openPopup();

  // Show detail panel
  const panel = document.getElementById('detailPanel');
  const maxScores = { sizeMatch: 25, valueRange: 20, holdDuration: 20, taxStatus: 15, location: 10, ownerType: 10 };
  const labels = { sizeMatch: 'Size Match', valueRange: 'Value Range', holdDuration: 'Hold Duration', taxStatus: 'Tax Status', location: 'Location', ownerType: 'Owner Type' };

  let breakdownHTML = '';
  if (p.scoreBreakdown) {
    breakdownHTML = `<div class="breakdown"><h4>Score Breakdown</h4>` +
      Object.entries(p.scoreBreakdown).map(([k, v]) => {
        const max = maxScores[k] || 25;
        const pct = (v / max * 100).toFixed(0);
        return `<div class="breakdown-bar">
          <span class="bar-label">${labels[k] || k}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="bar-val">${v}/${max}</span>
        </div>`;
      }).join('') + `</div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <h3>${p.address}</h3>
    <div class="detail-grid">
      <div class="detail-item"><div class="label">Owner</div><div class="value">${p.owner || '—'}</div></div>
      <div class="detail-item"><div class="label">Owner State</div><div class="value">${p.ownerState || '—'}</div></div>
      <div class="detail-item"><div class="label">Score</div><div class="value" style="color:${scoreColor(p.score)};font-size:18px;">${p.score}</div></div>
      <div class="detail-item"><div class="label">Building SF</div><div class="value">${fmt(p.buildingSF)}</div></div>
      <div class="detail-item"><div class="label">Assessed Value</div><div class="value">${fmtMoney(p.assessedValue)}</div></div>
      <div class="detail-item"><div class="label">Year Built</div><div class="value">${p.yearBuilt || '—'}</div></div>
      <div class="detail-item"><div class="label">Last Sale</div><div class="value">${p.lastSaleDate || '—'}</div></div>
      <div class="detail-item"><div class="label">Tax Status</div><div class="value">${p.taxStatus}</div></div>
      <div class="detail-item"><div class="label">Zoning</div><div class="value">${p.zoning}</div></div>
      <div class="detail-item"><div class="label">Acreage</div><div class="value">${p.acreage}</div></div>
      <div class="detail-item"><div class="label">Building Type</div><div class="value">${p.buildingType}</div></div>
    </div>
    ${breakdownHTML}
  `;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  document.querySelectorAll('.prop-card').forEach(c => c.classList.remove('active'));
}

function applyFilters() {
  const minScore = parseInt(document.getElementById('filterScore').value);
  const taxFilter = document.getElementById('filterTax').value;
  const sortBy = document.getElementById('sortBy').value;

  let filtered = allProperties.filter(p => {
    if (p.score < minScore) return false;
    if (taxFilter && p.taxStatus !== taxFilter) return false;
    return true;
  });

  if (sortBy === 'score') filtered.sort((a,b) => b.score - a.score);
  else if (sortBy === 'value') filtered.sort((a,b) => b.assessedValue - a.assessedValue);
  else if (sortBy === 'size') filtered.sort((a,b) => b.buildingSF - a.buildingSF);

  renderList(filtered);
  addMarkers(filtered);
}

// Init
initMap();
applyFilters();
</script>
